<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 900" width="100%" height="100%" style="background-color: #0f172a; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;">
  
  <!-- ĐỊNH NGHĨA HIỆU ỨNG (GLOW & GRADIENT) -->
  <defs>
    <!-- Hiệu ứng phát sáng cho Sân khấu -->
    <filter id="stage-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <!-- Gradient cho Sân khấu -->
    <linearGradient id="stage-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="50%" stop-color="#818cf8" />
      <stop offset="100%" stop-color="#c084fc" />
    </linearGradient>

    <!-- Gradients cho các khu vực vé -->
    <linearGradient id="svip-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f43f5e" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#f43f5e" stop-opacity="0.05" />
    </linearGradient>
    
    <linearGradient id="vip-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fb923c" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#fb923c" stop-opacity="0.05" />
    </linearGradient>

    <linearGradient id="cat1-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0.05" />
    </linearGradient>

    <linearGradient id="ga-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0.05" />
    </linearGradient>
  </defs>

  <!-- TIÊU ĐỀ SƠ ĐỒ -->
  <text x="400" y="40" text-anchor="middle" fill="#ffffff" font-size="24" font-weight="bold" letter-spacing="2">SƠ ĐỒ KHU VỰC SÂN KHẤU</text>
  <text x="400" y="65" text-anchor="middle" fill="#94a3b8" font-size="14">Vui lòng chọn khu vực vé của bạn</text>

  <!-- ================= STAGE (SÂN KHẤU) ================= -->
  <g transform="translate(0, 100)">
    <!-- Ánh sáng hào quang phía sau sân khấu -->
    <ellipse cx="400" cy="40" rx="220" ry="20" fill="#818cf8" opacity="0.3" filter="url(#stage-glow)" />
    <!-- Khối sân khấu chính -->
    <path d="M 180,50 L 620,50 L 580,0 L 220,0 Z" fill="url(#stage-grad)" />
    <!-- Chữ STAGE / SÂN KHẤU -->
    <text x="400" y="32" text-anchor="middle" fill="#0f172a" font-size="20" font-weight="800" letter-spacing="4">STAGE / SÂN KHẤU</text>
  </g>

  <!-- ================= CÁC KHU VỰC VÉ (ZONES) ================= -->

  <!-- KHU 1: SVIP (Bên trái & Bên phải sát sân khấu) -->
  <!-- SVIP LEFT -->
  <g id="zone-svip-left">
    <path d="M 220,170 L 390,170 L 390,300 L 200,300 Z" fill="url(#svip-grad)" stroke="#f43f5e" stroke-width="2" stroke-dasharray="4 2"/>
    <text x="295" y="225" text-anchor="middle" fill="#f43f5e" font-size="18" font-weight="bold">SVIP</text>
    <text x="295" y="250" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="bold">250 Vé</text>
  </g>
  <!-- SVIP RIGHT -->
  <g id="zone-svip-right">
    <path d="M 410,170 L 580,170 L 600,300 L 410,300 Z" fill="url(#svip-grad)" stroke="#f43f5e" stroke-width="2" stroke-dasharray="4 2"/>
    <text x="495" y="225" text-anchor="middle" fill="#f43f5e" font-size="18" font-weight="bold">SVIP</text>
    <text x="495" y="250" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="bold">250 Vé</text>
  </g>
  <!-- Tổng số lượng SVIP chú thích ở giữa -->
  <rect x="360" y="285" width="80" height="30" rx="6" fill="#f43f5e"/>
  <text x="400" y="305" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="bold">Tổng: 500</text>


  <!-- KHU 2: VIP (Nằm ngay sau SVIP) -->
  <g id="zone-vip" transform="translate(0, 20)">
    <path d="M 195,310 L 605,310 L 635,450 L 165,450 Z" fill="url(#vip-grad)" stroke="#fb923c" stroke-width="2"/>
    <text x="400" y="375" text-anchor="middle" fill="#fb923c" font-size="22" font-weight="bold" letter-spacing="1">VIP</text>
    <text x="400" y="405" text-anchor="middle" fill="#ffffff" font-size="16" font-weight="bold">1,000 Ghế ngồi</text>
  </g>


  <!-- KHU 3: CAT 1 (Khu đứng phía trước) -->
  <g id="zone-cat1" transform="translate(0, 30)">
    <path d="M 160,460 L 640,460 L 670,600 L 130,600 Z" fill="url(#cat1-grad)" stroke="#22c55e" stroke-width="2"/>
    <text x="400" y="525" text-anchor="middle" fill="#22c55e" font-size="22" font-weight="bold" letter-spacing="1">CAT 1</text>
    <text x="400" y="555" text-anchor="middle" fill="#ffffff" font-size="16" font-weight="bold">1,500 Vé đứng</text>
  </g>


  <!-- KHU 4: GA (General Admission - Khu đứng tự do phía sau cùng) -->
  <g id="zone-ga" transform="translate(0, 40)">
    <path d="M 125,610 L 675,610 L 710,770 L 90,770 Z" fill="url(#ga-grad)" stroke="#3b82f6" stroke-width="2"/>
    <text x="400" y="680" text-anchor="middle" fill="#3b82f6" font-size="24" font-weight="bold" letter-spacing="1">GENERAL ADMISSION (GA)</text>
    <text x="400" y="715" text-anchor="middle" fill="#ffffff" font-size="18" font-weight="bold">2,000 Vé tự do</text>
  </g>


  <!-- ================= BẢNG CHÚ THÍCH (LEGEND) ================= -->
  <g transform="translate(50, 810)">
    <!-- Nền bảng chú thích -->
    <rect x="0" y="0" width="700" height="60" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    
    <!-- Item SVIP -->
    <circle cx="30" cy="30" r="10" fill="#f43f5e" />
    <text x="50" y="28" fill="#ffffff" font-size="13" font-weight="bold">SVIP</text>
    <text x="50" y="45" fill="#94a3b8" font-size="11">500 vé</text>

    <!-- Item VIP -->
    <circle cx="200" cy="30" r="10" fill="#fb923c" />
    <text x="220" y="28" fill="#ffffff" font-size="13" font-weight="bold">VIP</text>
    <text x="220" y="45" fill="#94a3b8" font-size="11">1,000 vé</text>

    <!-- Item CAT 1 -->
    <circle cx="380" cy="30" r="10" fill="#22c55e" />
    <text x="400" y="28" fill="#ffffff" font-size="13" font-weight="bold">CAT 1</text>
    <text x="400" y="45" fill="#94a3b8" font-size="11">1,500 vé</text>

    <!-- Item GA -->
    <circle cx="560" cy="30" r="10" fill="#3b82f6" />
    <text x="580" y="28" fill="#ffffff" font-size="13" font-weight="bold">GA</text>
    <text x="580" y="45" fill="#94a3b8" font-size="11">2,000 vé</text>
  </g>

</svg>
